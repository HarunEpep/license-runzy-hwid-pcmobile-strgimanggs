<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e17;
            color: #e0e4f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #0f1322;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(101, 33, 240, 0.3);
            border: 1px solid #3d257a;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            color: #00a2ff;
            margin-bottom: 5px;
        }
        p {
            color: #8fa0c2;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background-color: #161c33;
            border: 1px solid #222d52;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #630dd6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #791bf2;
        }
        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }
        .valid {
            background-color: rgba(0, 200, 100, 0.15);
            color: #00ff7b;
            border: 1px solid #00c864;
        }
        .invalid {
            background-color: rgba(255, 50, 50, 0.15);
            color: #ff4d4d;
            border: 1px solid #ff3232;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>License Checker</h2>
    <p>Verifikasi status HwId yang aktif di server saat ini</p>
    
    <input type="text" id="hwidInput" placeholder="Masukkan HWID (Contoh: WINDOWS-UUID...)">
    <button onclick="checkLicense()">PERIKSA LISENSI</button>
    
    <div id="resultBox" class="result"></div>
</div>

<script>
    async function checkLicense() {
        const hwid = document.getElementById('hwidInput').value.trim();
        const resultBox = document.getElementById('resultBox');
        
        if(!hwid) {
            alert('Silakan masukkan HWID terlebih dahulu!');
            return;
        }

        resultBox.style.display = 'block';
        resultBox.className = 'result';
        resultBox.innerText = 'Memeriksa database cloud...';

        try {
            // Memanggil API serverless function dari Vercel Anda
            const response = await fetch(`/api/validate?hwid=${encodeURIComponent(hwid)}`);
            const data = await response.text();

            if (data.includes("VALID")) {
                resultBox.classList.add('valid');
                resultBox.innerText = 'STATUS: TERVERIFIKASI (WHITELISTED)';
            } else {
                resultBox.classList.add('invalid');
                resultBox.innerText = 'STATUS: BELUM TERDAFTAR';
            }
        } catch (error) {
            resultBox.classList.add('invalid');
            resultBox.innerText = 'ERROR: Gagal menghubungi server lisensi!';
            console.error(error);
        }
    }
</script>

</body>
</html>
